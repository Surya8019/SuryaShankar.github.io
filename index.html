/* ============================================================
   1. THEME TOKENS  — change colors & fonts here
============================================================ */
:root{
  --bg:#0B0D12;
  --bg-2:#0F1218;
  --surface:#14181F;
  --surface-2:#191E27;
  --line:#242A35;
  --line-soft:#1C212B;
  --text:#EAECF1;
  --muted:#939BAC;
  --faint:#6B7384;
  --accent:#F5C451;          /* signal gold */
  --accent-dim:rgba(245,196,81,.12);
  --ok:#5BD6A3;

  --font-display:'Space Grotesk', system-ui, sans-serif;
  --font-body:'Inter', system-ui, sans-serif;
  --font-mono:'IBM Plex Mono', ui-monospace, monospace;

  --maxw:1080px;
  --rail:108px;             /* left index rail width (desktop) */
  --radius:14px;
}

/* ============================================================
   2. BASE
============================================================ */
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
@media (prefers-reduced-motion:reduce){html{scroll-behavior:auto}}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font-body);
  font-size:16px;
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
body::before{ /* subtle grid atmosphere */
  content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(var(--line-soft) 1px,transparent 1px),
                   linear-gradient(90deg,var(--line-soft) 1px,transparent 1px);
  background-size:64px 64px;
  -webkit-mask-image:radial-gradient(ellipse 90% 60% at 50% 0%,#000 0%,transparent 80%);
          mask-image:radial-gradient(ellipse 90% 60% at 50% 0%,#000 0%,transparent 80%);
  opacity:.5;
}
a{color:inherit;text-decoration:none}
img{display:block;max-width:100%}
::selection{background:var(--accent);color:#0B0D12}
:focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:4px}

.wrap{max-width:var(--maxw);margin:0 auto;padding:0 24px;position:relative;z-index:1}
.mono{font-family:var(--font-mono)}
.accent{color:var(--accent)}

/* ============================================================
   3. NAV
============================================================ */
.nav{
  position:sticky;top:0;z-index:50;
  backdrop-filter:saturate(140%) blur(10px);
  background:rgba(11,13,18,.72);
  border-bottom:1px solid var(--line-soft);
}
.nav-inner{display:flex;align-items:center;justify-content:space-between;height:60px}
.brand{font-family:var(--font-mono);font-weight:600;letter-spacing:.02em;font-size:.92rem}
.brand .dot{color:var(--accent)}
.nav-links{display:flex;gap:26px;font-family:var(--font-mono);font-size:.78rem;letter-spacing:.04em;text-transform:uppercase}
.nav-links a{color:var(--muted);transition:color .2s}
.nav-links a:hover,.nav-links a.active{color:var(--text)}
.nav-links a.active{color:var(--accent)}
.nav-cta{
  font-family:var(--font-mono);font-size:.78rem;letter-spacing:.03em;
  color:var(--accent);border:1px solid var(--accent);border-radius:999px;
  padding:7px 15px;transition:background .2s,color .2s;
}
.nav-cta:hover{background:var(--accent);color:#0B0D12}
.nav-toggle{display:none;background:none;border:1px solid var(--line);color:var(--text);
  font-family:var(--font-mono);font-size:.75rem;padding:6px 12px;border-radius:8px;cursor:pointer}

/* ============================================================
   4. SECTION SCAFFOLD (left index rail + content)
============================================================ */
.section{padding:78px 0;border-top:1px solid var(--line-soft)}
.section:first-of-type{border-top:none}
.section-grid{display:grid;grid-template-columns:var(--rail) 1fr;gap:34px}
.rail{position:relative}
.rail-index{font-family:var(--font-mono);font-size:.8rem;color:var(--accent);font-weight:600}
.rail-label{
  font-family:var(--font-mono);font-size:.7rem;letter-spacing:.16em;text-transform:uppercase;
  color:var(--faint);margin-top:8px;writing-mode:horizontal-tb;
}
.rail::after{content:"";position:absolute;left:2px;top:30px;bottom:-78px;width:1px;
  background:linear-gradient(var(--line),transparent);}
.section:last-child .rail::after{display:none}

.section-title{font-family:var(--font-display);font-weight:600;font-size:clamp(1.5rem,3vw,2rem);
  letter-spacing:-.01em;line-height:1.15;margin-bottom:6px}
.section-kicker{color:var(--muted);max-width:60ch;margin-bottom:30px}

/* ============================================================
   5. HERO
============================================================ */
.hero{padding:64px 0 70px;position:relative}
.hero-tag{font-family:var(--font-mono);font-size:.78rem;letter-spacing:.05em;color:var(--accent);
  display:inline-flex;align-items:center;gap:9px;margin-bottom:22px}
.hero-tag .pulse{width:8px;height:8px;border-radius:50%;background:var(--ok);
  box-shadow:0 0 0 0 rgba(91,214,163,.6);animation:pulse 2.4s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(91,214,163,.5)}70%{box-shadow:0 0 0 8px rgba(91,214,163,0)}100%{box-shadow:0 0 0 0 rgba(91,214,163,0)}}
@media (prefers-reduced-motion:reduce){.hero-tag .pulse{animation:none}}

.hero-grid{display:grid;grid-template-columns:1fr auto;gap:48px;align-items:center}
.hero-h1{font-family:var(--font-display);font-weight:700;
  font-size:clamp(2.4rem,6.4vw,4.4rem);line-height:1.02;letter-spacing:-.02em}
.hero-role{font-family:var(--font-mono);color:var(--muted);margin-top:18px;font-size:1rem;letter-spacing:.01em}
.caret{display:inline-block;width:.6ch;height:1.05em;background:var(--accent);
  margin-left:4px;transform:translateY(2px);animation:blink 1.1s steps(1) infinite}
@keyframes blink{50%{opacity:0}}
@media (prefers-reduced-motion:reduce){.caret{animation:none}}
.hero-lede{margin-top:24px;max-width:52ch;color:var(--text);font-size:1.05rem}

.portrait{position:relative;width:188px;flex:none}
.portrait img{width:188px;height:188px;object-fit:cover;border-radius:18px;
  border:1px solid var(--line);filter:grayscale(.15) contrast(1.02)}
.portrait::before{content:"";position:absolute;inset:-10px;border-radius:24px;
  border:1px solid var(--accent-dim);pointer-events:none}
.portrait .ping{position:absolute;bottom:-8px;left:-8px;background:var(--surface);
  border:1px solid var(--line);border-radius:9px;padding:5px 10px;
  font-family:var(--font-mono);font-size:.68rem;color:var(--ok);display:flex;align-items:center;gap:6px}
.portrait .ping i{width:7px;height:7px;border-radius:50%;background:var(--ok)}

.hero-actions{display:flex;flex-wrap:wrap;gap:12px;margin-top:34px}
.btn{font-family:var(--font-mono);font-size:.85rem;letter-spacing:.02em;padding:11px 18px;border-radius:10px;

.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn.primary{background:var(--accent);color:#0B0D12;border-color:var(--accent);font-weight:600}

.facts{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line-soft);

.fact{background:var(--bg-2);padding:18px 20px}

.chip:hover{border-color:var(--accent);color:var(--accent)}

/* ============================================================
   7. EXPERIENCE
============================================================ */
.xp{position:relative;padding:0 0 30px 26px;border-left:1px solid var(--line)}

footer{border-top:1px solid var(--line-soft);padding:28px 0;margin-top:0}

.reveal.in{opacity:1;transform:none}
@media (prefers-reduced-motion:reduce){.reveal{opacity:1;transform:none;transition:none}}

   13. RESPONSIVE
============================================================ */

}

$('#heroName').textContent = DATA.name;
$('#heroRole').innerHTML = esc(DATA.role) + '<span class="caret"></span>';
$('#heroLede').textContent = DATA.lede;
$('#footLeft').textContent = '© ' + new Date().getFullYear() + ' ' + DATA.name;

const c = DATA.contacts;
$('#heroActions').append(
  Object.assign(el('a','btn primary','Email me →'),{href:'mailto:'+c.email}),
  Object.assign(el('a','btn','LinkedIn ↗'),{href:c.linkedin,target:'_blank',rel:'noopener'}),
  Object.assign(el('a','btn','Credly ↗'),{href:c.credly,target:'_blank',rel:'noopener'})
);

const facts = $('#facts');
DATA.facts.forEach(f=>{
  const d = el('div','fact');
  d.append(el('div','k',esc(f.k)), el('div','v',esc(f.v)));
  facts.append(d);
});

/* generic section builder */
function section(id,index,label,title,kicker,bodyNode){
  const s = el('section','section reveal'); s.id=id;
  const grid = el('div','wrap section-grid');
  const rail = el('div','rail');
  rail.append(el('div','rail-index',index), el('div','rail-label',label));
  const main = el('div','section-main');
  main.append(el('h2','section-title',title));
  if(kicker) main.append(el('p','section-kicker',kicker));
  main.append(bodyNode);
  grid.append(rail,main); s.append(grid);
  return s;
}

const content = $('#content');

/* ABOUT / SKILLS */
const skillsBody = el('div');
DATA.skills.forEach(g=>{
  const grp = el('div','skill-group');
  grp.append(el('h3',null,esc(g.group)));
  const chips = el('div','chips');
  g.items.forEach(i=>chips.append(el('span','chip',esc(i))));
  grp.append(chips); skillsBody.append(grp);
});

/* EXPERIENCE */
const xpBody = el('div');
DATA.experience.forEach(x=>{
  const w = el('div','xp');
  w.append(el('div','xp-when',esc(x.when)));
  w.append(el('div','xp-role',esc(x.role)));
  w.append(el('div','xp-org',esc(x.org)));
  if(x.sub) w.append(el('div','xp-sub',esc(x.sub)));
  const ul = el('ul');
  x.points.forEach(p=>ul.append(el('li',null,p)));
  w.append(ul); xpBody.append(w);
});

/* PROJECTS */
const projBody = el('div','proj-grid');
DATA.projects.forEach((p,i)=>{
  const card = el('div','proj');
  card.append(el('div','proj-no','PRJ-'+String(i+1).padStart(2,'0')));
  card.append(el('h3',null,esc(p.title)));
  card.append(el('p',null,esc(p.desc)));
  const st = el('div','stack');
  p.stack.forEach(s=>st.append(el('span',null,esc(s))));
  card.append(st); projBody.append(card);
});

/* CERTS */
const certBody = el('div','cert-grid');
DATA.certifications.forEach(ct=>{
  const d = el('div','cert');
  d.append(el('div','mk','◈'));
  const t = el('div');
  t.append(el('div','nm',esc(ct.name)), el('div','is',esc(ct.issuer)));
  d.append(t); certBody.append(d);
});

/* EDUCATION + ACHIEVEMENTS + TRAINING combined */
const eduBody = el('div');
const eduList = el('div');
DATA.education.forEach(e=>{
  const r = el('div','edu');
  const left = el('div'); left.append(el('div','deg',esc(e.deg)), el('div','inst',esc(e.inst)));
  r.append(left, el('div','meta',esc(e.meta)));

});
eduBody.append(eduList);

const achWrap = el('div'); achWrap.style.marginTop='34px';
achWrap.append(el('h3',null,'<span style="font-family:var(--font-mono);font-size:.78rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)">Achievements & Recognition</span>'));
DATA.achievements.forEach(a=>{
  const co = el('div','callout');
  co.append(el('div','t',esc(a.t)), el('p',null,esc(a.d)));
  achWrap.append(co);
});
const trainWrap = el('div'); trainWrap.style.marginTop='22px';
trainWrap.append(el('h3',null,'<span style="font-family:var(--font-mono);font-size:.78rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)">Training</span>'));
const tl = el('div','list-plain'); tl.style.marginTop='12px';
DATA.training.forEach(t=>{const row=el('div');row.append(el('span','mk','›'),el('span',null,esc(t)));tl.append(row);});
trainWrap.append(tl);
eduBody.append(achWrap,trainWrap);

/* CONTACT */
const contactWrap = el('div','wrap reveal'); contactWrap.id='contact';
contactWrap.style.padding='78px 24px';
const cc = el('div','contact');
cc.append(el('h2',null,"Let's talk security."));
cc.append(el('p',null,'Open to roles and collaborations in offensive security, VAPT and security governance. The fastest way to reach me is email.'));
const cl = el('div','contact-links');
cl.append(
  Object.assign(el('a','btn primary','✉  '+c.email),{href:'mailto:'+c.email}),
  Object.assign(el('a','btn','📞  '+c.phone),{href:'tel:'+c.phone.replace(/\s/g,'')}),
  Object.assign(el('a','btn','LinkedIn ↗'),{href:c.linkedin,target:'_blank',rel:'noopener'}),
  Object.assign(el('a','btn','Credly ↗'),{href:c.credly,target:'_blank',rel:'noopener'})
);
cc.append(cl); contactWrap.append(cc);

/* mount */
content.append(
  section('skills','01','Capabilities','Skills & toolchain','The stack I work with day to day, grouped by domain.',skillsBody),
  section('work','02','Timeline','Work experience','Roles across banking security and network operations.',xpBody),
  section('projects','03','Selected','Projects','Hands-on security work, end to end.',projBody),
  section('certs','04','Verified','Certifications','Credentials in security, governance and networking.',certBody),
  section('education','05','Record','Education & more','Academic background, recognition and training.',eduBody),
  contactWrap
);

/* nav: mobile toggle */
$('#navToggle').addEventListener('click',()=>$('#navLinks').classList.toggle('open'));
$('#navLinks').addEventListener('click',e=>{ if(e.target.tagName==='A') $('#navLinks').classList.remove('open'); });

/* reveal on scroll */
const io = new IntersectionObserver((entries)=>{
  entries.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target);}});
},{threshold:.12});
document.querySelectorAll('.reveal').forEach(s=>io.observe(s));

/* active nav highlight */
const navMap = [...document.querySelectorAll('.nav-links a')];
const spy = new IntersectionObserver((entries)=>{
  entries.forEach(e=>{
    if(e.isIntersecting){
      const id = e.target.id;
      navMap.forEach(a=>a.classList.toggle('active', a.getAttribute('href')==='#'+id));
    }
  });
},{rootMargin:'-45% 0px -50% 0px'});
['skills','work','projects','certs','education'].forEach(id=>{const n=document.getElementById(id);if(n)spy.observe(n);});
</script>
</body>
